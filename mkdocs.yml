site_name: croissant-baker
site_url: https://lcp.mit.edu/croissant-baker/
site_description: Automatic Croissant JSON-LD metadata generation for ML datasets
site_author: MIT Laboratory for Computational Physiology
repo_url: https://github.com/MIT-LCP/croissant-baker
repo_name: MIT-LCP/croissant-baker
edit_uri: edit/main/docs/

theme:
  name: material
  logo: assets/baker_logo.png
  favicon: assets/baker_logo.png
  palette:
    # Light mode
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest

exclude_docs: |
  _generated/

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            filters:
              - "!^_"
            show_root_heading: true
            show_source: false

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path: [docs, .]
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/MIT-LCP/croissant-baker
      name: GitHub
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/croissant-baker/
      name: PyPI

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - User Guide:
      - Supported Formats: user-guide/supported-formats.md
      - Examples: user-guide/examples.md
      - RAI Metadata: user-guide/rai.md
  - Reference:
      - CLI: reference/cli.md
      - API: reference/api.md
